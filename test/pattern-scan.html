<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>pattern-scan 로컬 테스트</title>
<link rel="stylesheet" href="../css/pattern-scan.css" />
<style>
  body { font-family: 'Nanum Myeongjo', Georgia, serif; margin: 0; background: #fff; }
  html.dark body { background: #1a1a1a; }
  .page-body { max-width: 900px; margin: 40px auto; padding: 0 16px; }
  .toggle-dark { margin-bottom: 16px; }
</style>
</head>
<body>

<div class="page-body">
  <h1>pattern-scan 로컬 테스트</h1>
  <button class="toggle-dark" onclick="document.documentElement.classList.toggle('dark')">다크모드 토글</button>
  <p style="font-size:13px;color:#888">mock 데이터로 3개 탭 + 캔들차트 오버레이를 확인. 실제 GAS 호출은 배포 후 별도 확인.</p>
  <div id="pattern-scan"></div>
</div>

<script src="../js/pattern-scan.js"></script>
<script>
  // mock 일봉 생성: 저점상승형/쌍바닥/역헤드앤숄더 모양을 각각 흉내
  function genDaily(lowPattern) {
    var daily = [];
    var base = new Date('2026-07-10');
    var close = 50000;
    // lowPattern: 20개 인덱스에 대응하는 저가 오프셋 배열 (모양 결정용)
    for (var i = 19; i >= 0; i--) {
      var d = new Date(base);
      d.setDate(d.getDate() - i - Math.floor(i / 5) * 2);
      var idx = 19 - i;
      var offset = lowPattern[idx] || 0;
      var low = 48000 + offset;
      var high = low + 1200 + Math.random() * 800;
      var open = low + Math.random() * (high - low) * 0.4;
      var closeP = low + Math.random() * (high - low) * 0.6;
      daily.push({
        date: d.toISOString().slice(0, 10),
        open: Math.round(open),
        high: Math.round(high),
        low: Math.round(low),
        close: Math.round(closeP),
        volume: Math.round(5000000 + Math.random() * 3000000)
      });
    }
    return daily;
  }

  // 저점상승형: 계단식으로 저점이 뚜렷하게 우상향(각 저점이 스윙 판정 가능하도록 골 간격을 확보)
  var risingLowsDaily = genDaily([1400, 1000, 700, 1000, 1400, 1800, 1500, 1200, 1500, 1900, 2300, 2000, 1700, 2000, 2300, 2700, 2400, 2200, 2400, 2600]);
  // 쌍바닥: 앞쪽 저점 - 반등 - 뒤쪽 비슷한 저점
  var doubleBottomDaily = genDaily([0, 300, 100, 50, 200, 800, 1500, 1800, 1400, 900, 400, 150, 80, 30, 250, 700, 1200, 1400, 1300, 1100]);
  // 역헤드앤숄더: 좌어깨 - 봉우리 - 헤드(가장 낮음) - 봉우리 - 우어깨 (간격을 넉넉히 둬서 봉우리 계산 여유 확보)
  var ihsDaily = genDaily([1800, 1400, 900, 400, 900, 1500, 2100, 1600, 1000, 400, 0, 400, 1000, 1600, 2100, 1500, 900, 400, 900, 1400]);
  // 박스권: 저점끼리·고점끼리 평평하게 오가며, 마지막이 저점 근처
  var boxDaily = genDaily([0, 550, 50, 600, 0, 550, 50, 600, 0, 550, 50, 600, 0, 550, 50, 600, 0, 550, 50, 30]);
  // 골파기: 고점 -> 급락(골) -> 랠리(반등고점) -> 눌림목(최근 며칠 되돌림)
  var goldDaily = genDaily([6000, 6500, 7000, 7500, 8000, 6500, 4500, 2500, 1200, 400, 0, 800, 1800, 3000, 4200, 5200, 6000, 5400, 5000, 4700]);

  function detectMock(daily, pattern) {
    // 실제 GAS 로직을 그대로 흉내내진 않고, mock용으로 스윙 저점/고점만 대충 골라서 오버레이 좌표를 만든다.
    function swingLows(win) {
      var idxs = [];
      for (var i = 2; i < win.length - 2; i++) {
        var v = win[i].low, ok = true;
        for (var k = i - 2; k <= i + 2; k++) { if (k !== i && win[k].low < v) { ok = false; break; } }
        if (ok) idxs.push(i);
      }
      return idxs;
    }
    function swingHighs(win) {
      var idxs = [];
      for (var i = 2; i < win.length - 2; i++) {
        var v = win[i].high, ok = true;
        for (var k = i - 2; k <= i + 2; k++) { if (k !== i && win[k].high > v) { ok = false; break; } }
        if (ok) idxs.push(i);
      }
      return idxs;
    }

    if (pattern === 'risingLows') {
      var lows = swingLows(daily), highs = swingHighs(daily);
      if (!lows.length || !highs.length) return null;
      var lowPoints = lows.map(function (i) { return { date: daily[i].date, price: daily[i].low }; });
      var curR = daily[daily.length - 1];
      var currentR = { date: curR.date, price: curR.close };
      return {
        low_swings: lowPoints,
        low_swings_display: lowPoints.concat([currentR]),
        high_swings: highs.map(function (i) { return { date: daily[i].date, price: daily[i].high }; }),
        resistance: Math.max.apply(null, highs.map(function (i) { return daily[i].high; })),
        signal: currentR,
        breakout: false
      };
    }
    if (pattern === 'doubleBottom') {
      var lows2 = swingLows(daily);
      var i1 = lows2[0], i2 = lows2[lows2.length - 1];
      var neckIdx = 0, neckHigh = -Infinity;
      for (var k = i1 + 1; k < i2; k++) { if (daily[k].high > neckHigh) { neckHigh = daily[k].high; neckIdx = k; } }
      var curD = daily[daily.length - 1];
      var currentD = { date: curD.date, price: curD.close };
      return {
        low1: { date: daily[i1].date, price: daily[i1].low },
        low2: { date: daily[i2].date, price: daily[i2].low },
        neckline: { date: daily[neckIdx].date, price: neckHigh },
        current: currentD,
        signal: currentD,
        breakout: false
      };
    }
    if (pattern === 'invHeadShoulders') {
      var lows3 = swingLows(daily);
      var iL = lows3[0], iH = lows3[Math.floor(lows3.length / 2)], iR = lows3[lows3.length - 1];
      function maxHighBetween(a, b) {
        var mh = -Infinity, mi = -1;
        for (var k = a + 1; k < b; k++) { if (daily[k].high > mh) { mh = daily[k].high; mi = k; } }
        return mi === -1 ? null : { date: daily[mi].date, high: mh };
      }
      var p1 = maxHighBetween(iL, iH), p2 = maxHighBetween(iH, iR);
      if (!p1 || !p2) return null; // 봉우리 사이 간격이 없으면(스윙 저점이 너무 붙어있으면) 이 mock 데이터로는 판정 불가
      var necklinePoint = p1.high <= p2.high ? p1 : p2;
      return {
        left_shoulder: { date: daily[iL].date, price: daily[iL].low },
        left_peak: { date: p1.date, price: p1.high },
        head: { date: daily[iH].date, price: daily[iH].low },
        right_peak: { date: p2.date, price: p2.high },
        right_shoulder: { date: daily[iR].date, price: daily[iR].low },
        neckline: { date: necklinePoint.date, price: Math.min(p1.high, p2.high) },
        current: (function () { var c = daily[daily.length - 1]; return { date: c.date, price: c.close }; })(),
        signal: (function () { var c = daily[daily.length - 1]; return { date: c.date, price: c.close }; })(),
        breakout: false
      };
    }
    if (pattern === 'boxRangeLow') {
      var bLows = swingLows(daily), bHighs = swingHighs(daily);
      var support = bLows.reduce(function (s, i) { return s + daily[i].low; }, 0) / bLows.length;
      var resistance = bHighs.reduce(function (s, i) { return s + daily[i].high; }, 0) / bHighs.length;
      var lastRow = daily[daily.length - 1];
      return {
        support: support,
        resistance: resistance,
        low_swings: bLows.map(function (i) { return { date: daily[i].date, price: daily[i].low }; }),
        high_swings: bHighs.map(function (i) { return { date: daily[i].date, price: daily[i].high }; }),
        signal: { date: lastRow.date, price: lastRow.close },
        breakout: false
      };
    }
    if (pattern === 'goldPitReversal') {
      var troughIdx = 0;
      for (var ti = 1; ti < daily.length; ti++) if (daily[ti].low < daily[troughIdx].low) troughIdx = ti;
      var preHighIdx = 0;
      for (var pi = 0; pi <= troughIdx; pi++) if (daily[pi].high > daily[preHighIdx].high) preHighIdx = pi;
      var rallyPeakIdx = troughIdx;
      for (var ri = troughIdx + 1; ri < daily.length; ri++) if (daily[ri].high > daily[rallyPeakIdx].high) rallyPeakIdx = ri;
      var lastRow2 = daily[daily.length - 1];
      return {
        pre_high: { date: daily[preHighIdx].date, price: daily[preHighIdx].high },
        trough: { date: daily[troughIdx].date, price: daily[troughIdx].low },
        rally_peak: { date: daily[rallyPeakIdx].date, price: daily[rallyPeakIdx].high },
        pullback: { date: lastRow2.date, price: lastRow2.close },
        signal: { date: lastRow2.date, price: lastRow2.close },
        breakout: false
      };
    }
    return null;
  }

  function mockMatch(daily, code, name) {
    var last = daily[daily.length - 1], prev = daily[daily.length - 2];
    return {
      code: code, name: name, price: last.close,
      changeRate: ((last.close - prev.close) / prev.close * 100),
      date: last.date
    };
  }

  var byPattern = {
    risingLows: { daily: risingLowsDaily, code: '005930', name: '삼성전자' },
    doubleBottom: { daily: doubleBottomDaily, code: '000660', name: 'SK하이닉스' },
    invHeadShoulders: { daily: ihsDaily, code: '035420', name: 'NAVER' },
    boxRangeLow: { daily: boxDaily, code: '005380', name: '현대차' },
    goldPitReversal: { daily: goldDaily, code: '000270', name: '기아' }
  };

  PatternScan.fetchJson = function (url) {
    console.log('[mock] fetch', url);
    if (url.indexOf('patternScan=1') > -1) {
      return Promise.resolve({
        scannedAt: '2026-07-11 16:00:00',
        universe: 238,
        scanned: 236,
        patterns: {
          risingLows: [mockMatch(byPattern.risingLows.daily, '005930', '삼성전자'), mockMatch(byPattern.risingLows.daily, '005380', '현대차')],
          doubleBottom: [mockMatch(byPattern.doubleBottom.daily, '000660', 'SK하이닉스')],
          invHeadShoulders: [mockMatch(byPattern.invHeadShoulders.daily, '035420', 'NAVER')],
          boxRangeLow: [mockMatch(byPattern.boxRangeLow.daily, '005380', '현대차')],
          goldPitReversal: [mockMatch(byPattern.goldPitReversal.daily, '000270', '기아')]
        }
      });
    }
    if (url.indexOf('patternChart=1') > -1) {
      var m = url.match(/pattern=([^&]+)/);
      var pattern = m ? decodeURIComponent(m[1]) : 'risingLows';
      var d = byPattern[pattern] || byPattern.risingLows;
      return Promise.resolve({
        code: d.code, daily: d.daily, pattern: pattern, detail: detectMock(d.daily, pattern)
      });
    }
    return Promise.resolve({});
  };
</script>

</body>
</html>
