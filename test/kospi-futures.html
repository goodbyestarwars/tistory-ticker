<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>kospi-futures 로컬 테스트</title>
<link rel="stylesheet" href="../css/kospi-futures.css" />
<style>
  body { font-family: 'Nanum Myeongjo', Georgia, serif; margin: 0; background: #fff; }
  html.dark body { background: #1a1a1a; }
  .page-body { max-width: 900px; margin: 40px auto; padding: 0 16px; }
  .tools { margin-bottom: 16px; display: flex; gap: 8px; flex-wrap: wrap; }
</style>
</head>
<body>

<div class="page-body">
  <h1>kospi-futures(코스피 선물) 로컬 테스트</h1>
  <div class="tools">
    <button onclick="document.documentElement.classList.toggle('dark')">다크모드 토글</button>
    <button onclick="setMock('up')">전부 상승</button>
    <button onclick="setMock('down')">전부 하락</button>
    <button onclick="setMock('mixed')">혼합</button>
    <button onclick="setMock('partial')">일부 데이터 없음(야간선물 KIS 미설정 상황)</button>
    <button onclick="setMock('error')">API 오류</button>
  </div>
  <p style="font-size:13px;color:#888">
    기본은 mock 데이터로 렌더링 검증(현재가 패널 3개: 코스피 현물지수/코스피200 주간선물/
    코스피200 야간선물 + 큰 차트 2개 + AI 해설 박스). 실제 VM/GAS 호출로 테스트하려면
    <code>?real=1</code>을 붙이세요(CORS가 ghlee.tistory.com만 허용하므로 로컬 http.server에서는
    막힐 수 있음 - 라이브 페이지에서 최종 확인 필요).
  </p>
  <div id="kospi-futures"></div>
</div>

<script src="../js/kospi-futures.js"></script>
<script>
  var SYMBOLS = [
    { symbol: 'KOSPI_CASH', name: '코스피', base: 6856.83, hasChart: false },
    { symbol: 'KOSPI200_DAY', name: '코스피200 주간선물', base: 1102.15, hasChart: true },
    { symbol: 'KOSPI200_NIGHT', name: '코스피200 야간선물', base: 1156.0, hasChart: true }
  ];

  function buildChart(base, days, trend) {
    var rows = [];
    var price = base * (1 - trend * 0.04);
    var today = new Date();
    for (var i = days; i >= 0; i--) {
      var d = new Date(today.getTime() - i * 86400000);
      var date = d.toISOString().slice(0, 10).replace(/-/g, '');
      var drift = (base * 0.04 * trend) / days;
      var noise = (Math.random() - 0.5) * base * 0.01;
      price = Math.max(0.01, price + drift + noise);
      var open = price - noise * 0.5;
      var high = Math.max(open, price) + Math.abs(noise) * 0.5;
      var low = Math.min(open, price) - Math.abs(noise) * 0.5;
      rows.push({ date: date, open: open, high: high, low: low, close: price });
    }
    return rows;
  }

  function mockResponse(mode) {
    return SYMBOLS.map(function (s, i) {
      if (mode === 'partial' && s.symbol === 'KOSPI200_NIGHT') {
        return { symbol: s.symbol, name: null, price: null, change: null, change_rate: null, high: null, low: null, updated_at: null, chart: [] };
      }
      var trend = mode === 'up' ? 1 : mode === 'down' ? -1 : (i % 2 === 0 ? 1 : -1);
      var chart = s.hasChart ? buildChart(s.base, 60, trend) : [];
      var last = chart.length ? chart[chart.length - 1] : null;
      var price = last ? last.close : s.base;
      var prevClose = chart.length > 1 ? chart[chart.length - 2].close : s.base * (1 - trend * 0.005);
      var change = price - prevClose;
      var changeRate = (change / prevClose) * 100;
      return {
        symbol: s.symbol,
        name: s.name,
        price: price,
        change: change,
        change_rate: changeRate,
        high: last ? last.high : price * 1.003,
        low: last ? last.low : price * 0.997,
        updated_at: new Date().toISOString(),
        chart: chart
      };
    });
  }

  if (location.search.indexOf('real=1') === -1) {
    // 모듈의 자체 DOMContentLoaded 리스너가 이 override 적용 이후에 실행되므로
    // 여기서 따로 init()을 호출하지 않아도 첫 렌더는 mock으로 자동 진행된다.
    KospiFutures.fetchFutures = function () {
      console.log('[mock] fetchFutures');
      if (window.__mockMode === 'error') return Promise.reject(new Error('mock error'));
      return Promise.resolve(mockResponse(window.__mockMode || 'mixed'));
    };
    KospiFutures.fetchAiSummary = function () {
      console.log('[mock] fetchAiSummary');
      if (window.__mockMode === 'error') return Promise.reject(new Error('mock error'));
      return Promise.resolve('코스피200 야간선물이 주간선물 종가 대비 소폭 상승 마감하며 위험선호 심리가 '
        + '이어졌습니다. 야간선물은 미국 증시 마감 이후 흐름을 가장 먼저 반영하는 지표라, 이 흐름이 '
        + '이어진다면 다음 거래일 코스피 현물은 상승 출발할 가능성이 있습니다. '
        + '다만 야간선물 거래량이 주간 대비 적어 변동성이 과장될 수 있는 점은 유의해야 합니다. '
        + '결국 실제 개장 후 방향은 외국인·기관 수급이 확인돼야 더 신뢰할 수 있습니다.');
    };
  }

  function setMock(mode) {
    window.__mockMode = mode;
    if (location.search.indexOf('real=1') === -1) KospiFutures.init();
  }
</script>

</body>
</html>
