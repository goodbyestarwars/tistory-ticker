<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>navbar mobile clipping check</title>
<link rel="stylesheet" href="../style.css?v=3" />
<style>
  .navbar { position: static; } /* fixed 대신 static으로 둬서 페이지 스크롤 없이 바로 보이게 */
  @keyframes bolt-strike {
    0%, 46%, 100% { opacity: 0.6; filter: drop-shadow(0 0 2px rgba(255,255,255,0.45)); }
    4%   { opacity: 1; filter: drop-shadow(0 0 6px rgba(255,255,255,0.9)) drop-shadow(0 0 12px rgba(255,255,255,0.5)); }
    8%   { opacity: 0.6; filter: drop-shadow(0 0 2px rgba(255,255,255,0.45)); }
    11%  { opacity: 1; filter: drop-shadow(0 0 8px rgba(255,255,255,1)) drop-shadow(0 0 16px rgba(255,255,255,0.6)); }
    15%  { opacity: 0.6; filter: drop-shadow(0 0 2px rgba(255,255,255,0.45)); }
  }
  .nav-logo-emblem {
    display: flex; align-items: center; justify-content: center;
  }
  .nav-bolt {
    animation: bolt-strike 3.6s ease-in-out infinite;
  }
  .nav-logo-name-gradient {
    font-family: 'Space Grotesk', 'Noto Sans KR', sans-serif;
    font-weight: 700;
    font-size: 18px;
    background: linear-gradient(135deg, #a5b4fc, #818cf8, #e0e7ff);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    letter-spacing: -0.5px;
  }
</style>
</head>
<body>
<div id="market-ribbon" class="market-ribbon"></div>
<nav class="navbar">
  <button class="nav-hamburger" id="mobileMenuBtn" aria-label="메뉴 열기">
    <span></span><span></span><span></span>
  </button>
  <a href="#" class="nav-logo">
    <div class="nav-logo-icon nav-logo-emblem">
      <svg width="26" height="26" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path class="nav-bolt" d="M13.5 1.5 4.2 13.7h5.6L8 22.5l11.8-13.1h-6.1z" fill="#ffffff"/>
      </svg>
    </div>
    <div class="nav-logo-text">
      <span class="nav-logo-name nav-logo-name-gradient">9bolt</span>
      <span class="nav-logo-sub">STARLIGHT WISDOM ALCOVE</span>
    </div>
  </a>

  <div class="nav-search">
    <input type="text" placeholder="9bolt 검색..." />
  </div>

  <div class="nav-icons">
    <button class="nav-dark-btn" id="darkModeBtn" title="다크모드" aria-label="다크모드 전환">
      <span class="dark-toggle-knob"></span>
    </button>
    <a href="#" class="nav-icon-btn">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="#8ba4c8" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
    </a>
    <button class="nav-icon-btn nav-search-btn" id="mobileSearchBtn" aria-label="검색">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="#8ba4c8" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    </button>
    <a href="#" class="nav-icon-btn nav-write-btn" title="글쓰기">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="#8ba4c8" stroke-width="2"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4Z"/></svg>
    </a>
    <a href="#" class="nav-icon-btn nav-manage-btn" title="관리자">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="#8ba4c8" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
    </a>
    <a href="#" class="nav-icon-btn nav-logout-btn" title="로그아웃" id="logoutIcon">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="#8ba4c8" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
    </a>
  </div>
</nav>
</body>
</html>
