<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>invest-signal 로컬 테스트</title>
<link rel="stylesheet" href="../css/invest-signal.css" />
<style>
  body { font-family: 'Nanum Myeongjo', Georgia, serif; margin: 0; background: #fff; }
  html.dark body { background: #1a1a1a; }
  .page-body { max-width: 900px; margin: 40px auto; padding: 0 16px; }
  .toggle-dark { margin-bottom: 16px; }
</style>
</head>
<body>

<div class="page-body">
  <h1>invest-signal 로컬 테스트</h1>
  <button class="toggle-dark" onclick="document.documentElement.classList.toggle('dark')">다크모드 토글</button>
  <p style="font-size:13px;color:#888">mock 데이터로 등급 버킷 + 수급 랭킹 5개 탭을 확인. 실제 GAS 호출은 scanInvestSignal 배치 실행 후 별도 확인.</p>
  <div id="invest-signal"></div>
</div>

<script src="../js/invest-signal.js"></script>
<script>
  var STOCKS = [
    ['005930', '삼성전자'], ['000660', 'SK하이닉스'], ['005380', '현대차'], ['000720', '현대건설'],
    ['267260', 'HD현대일렉트릭'], ['012450', '한화에어로스페이스'], ['035420', 'NAVER'], ['051910', 'LG화학'],
    ['105560', 'KB금융'], ['055550', '신한지주'], ['009540', 'HD한국조선해양'], ['010140', '삼성중공업'],
    ['011200', 'HMM'], ['034020', '두산에너빌리티'], ['003550', 'LG'], ['066570', 'LG전자'],
    ['015760', '한국전력공사'], ['017670', 'SK텔레콤'], ['030200', 'KT'], ['086790', '하나금융지주']
  ];

  function mockRow(i, priceBase, metricBase) {
    var s = STOCKS[i % STOCKS.length];
    var price = priceBase + Math.round((Math.random() - 0.5) * priceBase * 0.1);
    var changeRate = +((Math.random() - 0.45) * 6).toFixed(2);
    return [s[0], s[1], price, changeRate, metricBase != null ? metricBase : 0];
  }

  function genBucket(n, priceBase) {
    var out = [];
    for (var i = 0; i < n; i++) out.push(mockRow(i, priceBase, 3 + Math.random() * 2));
    return out;
  }

  function genRanked(n, priceBase, metricMin, metricMax, desc) {
    var out = [];
    for (var i = 0; i < n; i++) {
      var t = desc ? (n - i) / n : i / n;
      var metric = metricMin + (metricMax - metricMin) * t;
      out.push(mockRow(i, priceBase, Math.round(metric)));
    }
    return out;
  }

  // GAS 재배포/배치 실행 전이므로 기본은 mock으로 렌더링 검증
  InvestSignal.fetchJson = function (url) {
    console.log('[mock] fetch', url);
    return Promise.resolve({
      scannedAt: '2026-07-12 18:03:11',
      universe: 237,
      scanned: 231,
      counts: { '적극 매수': 14, '매수 우위': 37, '보유': 162, '비중축소': 49, '매도': 21 },
      buckets: {
        activeBuy: genBucket(14, 90000),
        buy: genBucket(37, 70000),
        hold: genBucket(100, 60000),   // 162종목 중 상위 100개만 캡핑 저장된 상황을 흉내
        reduce: genBucket(49, 40000),
        sell: genBucket(21, 20000)
      },
      rankings: {
        foreign: genRanked(20, 80000, 200000, 3000000, true),
        inst: genRanked(20, 75000, 150000, 2000000, true),
        pension: genRanked(20, 65000, 500, 15000, true),   // 백만원 단위(표시는 /100 = 억원)
        improved: genRanked(20, 55000, 5000, 80000, true),
        worsened: genRanked(20, 45000, -80000, -5000, true)
      }
    });
  };
</script>

</body>
</html>
