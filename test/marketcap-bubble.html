<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>marketcap-bubble 로컬 테스트</title>
<link rel="stylesheet" href="../css/marketcap-bubble.css" />
<style>
  body { font-family: 'Nanum Myeongjo', Georgia, serif; margin: 0; background: #fff; }
  .page-body { max-width: 780px; margin: 40px auto; padding: 0 16px; }
  .toggle-dark { margin-bottom: 16px; }
</style>
</head>
<body>

<div class="page-body">
  <h1>marketcap-bubble(히트맵) 로컬 테스트</h1>
  <button class="toggle-dark" onclick="document.documentElement.classList.toggle('dark')">다크모드 토글</button>
  <div id="marketcap-bubble" class="marketcap-bubble"></div>
</div>

<script src="../data/sectors-v3.js"></script>
<script src="../data/marketcap-codes.js"></script>
<script>
  // GAS 실배포 전이므로 mock 데이터로 렌더링만 검증.
  // 코스피/코스닥은 실제 GAS와 동일하게 data/sectors-v3.js(SECTOR_MAP)를 소스로 써서
  // 종목 수(238개)와 업종 태그(sectors)를 그대로 재현한다. ETF/INVERSE/LEV는
  // data/marketcap-codes.js 그대로.
  function mockQuote(code, name, baseCap, extra) {
    var cap = baseCap * (0.85 + Math.random() * 0.3);
    var changeRate = (Math.random() - 0.45) * 8;
    return Object.assign({ code: code, name: name, cap: cap, changeRate: changeRate }, extra || {});
  }

  function buildMock() {
    var data = { KOSPI: [], KOSDAQ: [], ETF: [], INVERSE: [], LEV: [] };

    // sectors-v3.js에서 코드 기준 유니크 + 섹터 목록 취합(GAS의 fetchSectorUniverseWithSectors_와 동일 로직)
    var byCode = {};
    var sectorMap = window.SECTOR_MAP || {};
    Object.keys(sectorMap).forEach(function (sector) {
      sectorMap[sector].forEach(function (it) {
        if (!byCode[it.code]) byCode[it.code] = { name: it.name, market: it.market, sectors: [] };
        if (byCode[it.code].sectors.indexOf(sector) === -1) byCode[it.code].sectors.push(sector);
      });
    });

    var i = 0;
    Object.keys(byCode).forEach(function (code) {
      var u = byCode[code];
      var baseCap = (u.market === 'KOSPI' ? 20e12 : 2e12) * Math.pow(0.93, i % 40);
      i++;
      var q = mockQuote(code, u.name, baseCap, { sectors: u.sectors });
      (data[u.market] || data.KOSPI).push(q);
    });

    ['ETF', 'INVERSE'].forEach(function (cat) {
      (window.MARKETCAP_CODES[cat] || []).forEach(function (pair, idx) {
        var baseCap = cat === 'ETF' ? 5e12 * Math.pow(0.85, idx) : 1e12 * Math.pow(0.85, idx);
        data[cat].push(mockQuote(pair[0], pair[1], baseCap));
      });
    });

    data.LEV = [
      { name: '삼성전자 단일종목레버리지(7종 합산)', cap: 4.5e12, changeRate: -8.2, breakdown: 'KODEX 2.7조 · TIGER 1.5조 · ACE 758억' },
      { name: 'SK하이닉스 단일종목레버리지(7종 합산)', cap: 7.0e12, changeRate: -7.9, breakdown: 'KODEX 4.3조 · TIGER 2.4조 · ACE 916억' }
    ];
    return { updatedAt: new Date().toISOString().slice(0, 19).replace('T', ' '), data: data };
  }

  window.__MOCK_BUBBLE__ = buildMock();
</script>
<script src="../js/marketcap-bubble.js"></script>
<script>
  MarketcapBubble.fetchBubbleData = function () {
    console.log('[mock] fetchBubbleData called');
    return Promise.resolve(window.__MOCK_BUBBLE__);
  };
  MarketcapBubble.init();

  // 갱신 시 부드러운 transition 확인용: 5초마다 mock 값 리셔플
  setInterval(function () {
    window.__MOCK_BUBBLE__ = buildMock();
  }, 5000);
</script>

</body>
</html>
