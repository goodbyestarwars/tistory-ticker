<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>stock-search-panel 로컬 테스트</title>
<link rel="stylesheet" href="../css/stock-search-panel.css" />
<style>
  body { font-family: 'Nanum Myeongjo', Georgia, serif; margin: 0; background: #fff; }
  html.dark body { background: #1a1a1a; color: #ddd; }
  .page-body { max-width: 780px; margin: 40px auto; padding: 0 16px 200px; }
  .tools { margin-bottom: 16px; display: flex; gap: 8px; flex-wrap: wrap; }
</style>
</head>
<body>

<div class="page-body">
  <h1>종목 검색 패널(v2: 소형 드롭다운) 로컬 테스트</h1>
  <div class="tools">
    <button onclick="document.documentElement.classList.toggle('dark')">다크모드 토글</button>
    <button onclick="localStorage.removeItem('stock:lastSelected'); localStorage.removeItem('stock:favorites'); localStorage.removeItem('stock:recent'); location.reload();">저장 초기화</button>
    <button onclick="StockSearchPanel.openDropdown()">드롭다운 열기</button>
  </div>
  <p style="font-size:13px;color:#888">
    krx_map.js는 CORS가 열려있어 로컬에서도 실제 로드됩니다. 종목을 고르면
    <code>/page/foreign-flow?code=&amp;name=</code>로 이동을 시도합니다(로컬엔 그 경로가 없어
    404가 뜨는 게 정상 - 실제 이동 자체가 되는지만 확인하는 용도). 우측 하단 🔍 버튼을 눌러
    드롭다운을 열고 "삼성전자"를 검색해보세요.
  </p>
</div>

<script src="../js/stock-search-panel.js"></script>

</body>
</html>
