<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>foreign-flow 로컬 테스트</title>
<link rel="stylesheet" href="../css/foreign-flow.css" />
<style>
  body { font-family: 'Nanum Myeongjo', Georgia, serif; margin: 0; background: #fff; }
  html.dark body { background: #1a1a1a; }
  .page-body { max-width: 780px; margin: 40px auto; padding: 0 16px; }
  .toggle-dark { margin-bottom: 16px; }
</style>
</head>
<body>

<div class="page-body">
  <h1>foreign-flow 로컬 테스트</h1>
  <button class="toggle-dark" onclick="document.documentElement.classList.toggle('dark')">다크모드 토글</button>
  <p style="font-size:13px;color:#888">기본은 mock 데이터. 실제 GAS 호출로 테스트하려면 <code>?real=1</code>을 붙이세요(GAS 재배포 후).</p>
  <div id="foreign-flow"></div>
</div>

<script src="../data/krx_map.js"></script>
<script src="../data/sectors-v3.js"></script>
<script src="../data/wics-map.js"></script>
<script src="../js/foreign-flow.js"></script>
<script>
  // GAS 재배포 전이므로 기본은 mock으로 렌더링 검증 (?real=1이면 실제 GAS 호출)
  if (location.search.indexOf('real=1') === -1) {
    // 2026-07-20: 투자시그널 통합 카운트바/가중치 탭 검증용 mock - loadSignalData()가
    // ForeignFlow.fetchJson(namespace 경유)으로만 부르므로 이 함수만 오버라이드해도
    // 나머지 내부 fetchJson() 직접호출(차트/펀더멘탈/시세 등)은 영향받지 않는다.
    ForeignFlow.fetchJson = function (url) {
      console.log('[mock] fetchJson', url);
      var STOCKS = [
        ['005930', '삼성전자'], ['000660', 'SK하이닉스'], ['005380', '현대차'], ['000720', '현대건설'],
        ['267260', 'HD현대일렉트릭'], ['012450', '한화에어로스페이스'], ['035420', 'NAVER'], ['051910', 'LG화학'],
        ['105560', 'KB금융'], ['055550', '신한지주'], ['009540', 'HD한국조선해양'], ['010140', '삼성중공업'],
        ['011200', 'HMM'], ['034020', '두산에너빌리티'], ['003550', 'LG'], ['066570', 'LG전자'],
        ['015760', '한국전력공사'], ['017670', 'SK텔레콤'], ['030200', 'KT'], ['086790', '하나금융지주']
      ];
      function genRanked(n, priceBase, metricMin, metricMax) {
        var out = [];
        for (var i = 0; i < n; i++) {
          var s = STOCKS[i % STOCKS.length];
          var t = (n - i) / n;
          var metric = metricMin + (metricMax - metricMin) * t;
          var price = priceBase + Math.round((Math.random() - 0.5) * priceBase * 0.1);
          var changeRate = +((Math.random() - 0.45) * 6).toFixed(2);
          var stars = Math.round((1.5 + t * 3.5) * 2) / 2;
          out.push([s[0], s[1], price, changeRate, Math.round(metric * 100) / 100, stars]);
        }
        return out;
      }
      function genBucket(n, priceBase) {
        var out = genRanked(n, priceBase, 1.5, 5).map(function (r) { return [r[0], r[1], r[2], r[3], r[5]]; });
        return out;
      }
      return Promise.resolve({
        scannedAt: '2026-07-20 18:03:11',
        universe: 2691,
        scanned: 2534,
        counts: { '적극 매수': 121, '매수 우위': 402, '보유': 1310, '비중축소': 512, '매도': 189 },
        buckets: {
          activeBuy: genBucket(20, 90000),
          buy: genBucket(20, 70000),
          hold: genBucket(20, 60000),
          reduce: genBucket(20, 40000),
          sell: genBucket(20, 20000)
        },
        rankings: {
          flow: genRanked(20, 90000, 40, 100),
          foreignInst: genRanked(20, 80000, 200000, 3000000),
          tech: genRanked(20, 70000, 30, 100),
          shortSafe: genRanked(20, 60000, 0.2, 8),
          pension: genRanked(20, 65000, 500, 15000),
          fundamental: genRanked(20, 50000, 30, 100)
        }
      });
    };

    ForeignFlow.fetchFlow = function (code) {
      var daily = [];
      var close = 280000;
      var ratio = 46.5;
      var shares = 2722000000;
      var today = new Date('2026-07-10');
      var trend = 1; // 최근 5일 순매수, 그 전엔 순매도가 많게 -> 추세전환 배지 확인용
      for (var i = 0; i < 40; i++) {
        var d = new Date(today);
        d.setDate(d.getDate() - i - Math.floor(i / 5) * 2); // 주말 건너뛰는 흉내
        var fn;
        if (i < 6) fn = Math.round(500000 + Math.random() * 2500000);            // 6일 연속 순매수
        else fn = Math.round((Math.random() - 0.62) * 6000000);                   // 과거엔 순매도 우위
        var inet = Math.round((Math.random() - 0.5) * 3000000);
        // 개인(ind_net) mock - 실제 시장처럼 외국인+기관과 대략 반대 방향으로 대충 흉내
        var indNet = Math.round(-(fn + inet) * (0.6 + Math.random() * 0.4) + (Math.random() - 0.5) * 1000000);
        close = Math.max(200000, close + Math.round((Math.random() - 0.5) * 8000));
        ratio = Math.max(40, Math.min(52, ratio + (fn > 0 ? 0.02 : -0.03)));
        shares += fn;
        daily.push({
          date: d.toISOString().slice(0, 10),
          close: close,
          change_pct: +((Math.random() - 0.5) * 4).toFixed(2),
          volume: Math.round(10000000 + Math.random() * 30000000),
          inst_net: inet,
          foreign_net: fn,
          ind_net: indNet,
          foreign_shares: shares,
          foreign_ratio: +ratio.toFixed(2)
        });
      }

      function rsum(field, n) {
        var s = 0;
        for (var i = 0; i < n; i++) s += daily[i][field];
        return s;
      }
      function asum(field, n) {
        var s = 0;
        for (var i = 0; i < n; i++) s += daily[i][field] * daily[i].close;
        return s;
      }
      var rolling = {
        today: { foreign: daily[0].foreign_net, inst: daily[0].inst_net, ind: daily[0].ind_net },
        '5d': { foreign: rsum('foreign_net', 5), inst: rsum('inst_net', 5), ind: rsum('ind_net', 5) },
        '10d': { foreign: rsum('foreign_net', 10), inst: rsum('inst_net', 10), ind: rsum('ind_net', 10) },
        '20d': { foreign: rsum('foreign_net', 20), inst: rsum('inst_net', 20), ind: rsum('ind_net', 20) }
      };
      function streakOf(field) {
        var first = daily[0][field];
        var dir = first > 0 ? 1 : first < 0 ? -1 : 0;
        var days = 0;
        if (dir !== 0) {
          for (var i = 0; i < daily.length; i++) {
            var v = daily[i][field];
            var d = v > 0 ? 1 : v < 0 ? -1 : 0;
            if (d !== dir) break;
            days++;
          }
        }
        return { days: days, direction: dir > 0 ? 'buy' : dir < 0 ? 'sell' : 'flat' };
      }
      function signalOf(field, key) {
        var v5 = rolling['5d'][key], v20 = rolling['20d'][key];
        var prior15 = v20 - v5;

        var n = Math.min(20, daily.length);
        var avgDaily = 0;
        for (var i = 0; i < n; i++) avgDaily += Math.abs(daily[i][field]);
        avgDaily = n ? avgDaily / n : 0;
        var magnitudeOk = Math.abs(v5) >= avgDaily * 2;

        var dir = (v5 > 0 && prior15 < 0) ? 'buy' : (v5 < 0 && prior15 > 0) ? 'sell' : null;

        var m = Math.min(5, daily.length);
        var sameDirDays = 0;
        for (var d = 0; d < m; d++) {
          var v = daily[d][field];
          if ((dir === 'buy' && v > 0) || (dir === 'sell' && v < 0)) sameDirDays++;
        }
        var consistencyOk = sameDirDays >= 3;

        var shift = !!dir && magnitudeOk && consistencyOk;

        var avgChangePct = 0;
        for (var c = 0; c < m; c++) avgChangePct += daily[c].change_pct;
        avgChangePct = m ? avgChangePct / m : 0;
        var priceConfirmed = dir === 'buy' ? avgChangePct > 0 : dir === 'sell' ? avgChangePct < 0 : false;

        return {
          trend_shift: shift,
          price_confirmed: priceConfirmed,
          note: shift
            ? ('최근 5일 ' + (v5 > 0 ? '플러스' : '마이너스') + ' vs 이전 15일 ' + (prior15 > 0 ? '플러스' : '마이너스')
              + ' 전환' + (priceConfirmed ? ' · 주가 동반' : ' · 주가 미동반'))
            : ''
        };
      }

      var name = '(mock)';
      var map = window.KRX_MAP || {};
      for (var nm in map) { if (map[nm] === code) { name = nm + ' (mock)'; break; } }

      console.log('[mock] fetchFlow', code);
      return Promise.resolve({
        code: code,
        name: name,
        as_of: daily[0].date,
        daily: daily,
        rolling: rolling,
        amount_estimate: {
          today_krw: asum('foreign_net', 1), '5d_krw': asum('foreign_net', 5),
          '10d_krw': asum('foreign_net', 10), '20d_krw': asum('foreign_net', 20),
          inst_today_krw: asum('inst_net', 1), inst_5d_krw: asum('inst_net', 5),
          inst_10d_krw: asum('inst_net', 10), inst_20d_krw: asum('inst_net', 20),
          ind_today_krw: asum('ind_net', 1), ind_5d_krw: asum('ind_net', 5),
          ind_10d_krw: asum('ind_net', 10), ind_20d_krw: asum('ind_net', 20)
        },
        streak: { foreign: streakOf('foreign_net'), inst: streakOf('inst_net'), ind: streakOf('ind_net') },
        signal: {
          foreign: signalOf('foreign_net', 'foreign'),
          inst: signalOf('inst_net', 'inst'),
          ind: signalOf('ind_net', 'ind')
        }
      });
    };
  }
</script>

</body>
</html>
