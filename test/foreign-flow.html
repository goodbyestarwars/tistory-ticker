<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>foreign-flow 로컬 테스트</title>
<link rel="stylesheet" href="../css/foreign-flow.css" />
<style>
  body { font-family: 'Nanum Myeongjo', Georgia, serif; margin: 0; background: #fff; }
  html.dark body { background: #1a1a1a; }
  .page-body { max-width: 780px; margin: 40px auto; padding: 0 16px; }
  .toggle-dark { margin-bottom: 16px; }
</style>
</head>
<body>

<div class="page-body">
  <h1>foreign-flow 로컬 테스트</h1>
  <button class="toggle-dark" onclick="document.documentElement.classList.toggle('dark')">다크모드 토글</button>
  <p style="font-size:13px;color:#888">기본은 mock 데이터. 실제 GAS 호출로 테스트하려면 <code>?real=1</code>을 붙이세요(GAS 재배포 후).</p>
  <div id="foreign-flow"></div>
</div>

<script src="../data/krx_map.js"></script>
<script src="../js/foreign-flow.js"></script>
<script>
  // GAS 재배포 전이므로 기본은 mock으로 렌더링 검증 (?real=1이면 실제 GAS 호출)
  if (location.search.indexOf('real=1') === -1) {
    ForeignFlow.fetchFlow = function (code) {
      var daily = [];
      var close = 280000;
      var ratio = 46.5;
      var shares = 2722000000;
      var today = new Date('2026-07-10');
      var trend = 1; // 최근 5일 순매수, 그 전엔 순매도가 많게 -> 추세전환 배지 확인용
      for (var i = 0; i < 40; i++) {
        var d = new Date(today);
        d.setDate(d.getDate() - i - Math.floor(i / 5) * 2); // 주말 건너뛰는 흉내
        var fn;
        if (i < 6) fn = Math.round(500000 + Math.random() * 2500000);            // 6일 연속 순매수
        else fn = Math.round((Math.random() - 0.62) * 6000000);                   // 과거엔 순매도 우위
        var inet = Math.round((Math.random() - 0.5) * 3000000);
        close = Math.max(200000, close + Math.round((Math.random() - 0.5) * 8000));
        ratio = Math.max(40, Math.min(52, ratio + (fn > 0 ? 0.02 : -0.03)));
        shares += fn;
        daily.push({
          date: d.toISOString().slice(0, 10),
          close: close,
          change_pct: +((Math.random() - 0.5) * 4).toFixed(2),
          volume: Math.round(10000000 + Math.random() * 30000000),
          inst_net: inet,
          foreign_net: fn,
          foreign_shares: shares,
          foreign_ratio: +ratio.toFixed(2)
        });
      }

      function rsum(field, n) {
        var s = 0;
        for (var i = 0; i < n; i++) s += daily[i][field];
        return s;
      }
      function asum(field, n) {
        var s = 0;
        for (var i = 0; i < n; i++) s += daily[i][field] * daily[i].close;
        return s;
      }
      var rolling = {
        today: { foreign: daily[0].foreign_net, inst: daily[0].inst_net },
        '5d': { foreign: rsum('foreign_net', 5), inst: rsum('inst_net', 5) },
        '10d': { foreign: rsum('foreign_net', 10), inst: rsum('inst_net', 10) },
        '20d': { foreign: rsum('foreign_net', 20), inst: rsum('inst_net', 20) }
      };
      function streakOf(field) {
        var first = daily[0][field];
        var dir = first > 0 ? 1 : first < 0 ? -1 : 0;
        var days = 0;
        if (dir !== 0) {
          for (var i = 0; i < daily.length; i++) {
            var v = daily[i][field];
            var d = v > 0 ? 1 : v < 0 ? -1 : 0;
            if (d !== dir) break;
            days++;
          }
        }
        return { days: days, direction: dir > 0 ? 'buy' : dir < 0 ? 'sell' : 'flat' };
      }
      function signalOf(field, key) {
        var v5 = rolling['5d'][key], v20 = rolling['20d'][key];
        var prior15 = v20 - v5;

        var n = Math.min(20, daily.length);
        var avgDaily = 0;
        for (var i = 0; i < n; i++) avgDaily += Math.abs(daily[i][field]);
        avgDaily = n ? avgDaily / n : 0;
        var magnitudeOk = Math.abs(v5) >= avgDaily * 2;

        var dir = (v5 > 0 && prior15 < 0) ? 'buy' : (v5 < 0 && prior15 > 0) ? 'sell' : null;

        var m = Math.min(5, daily.length);
        var sameDirDays = 0;
        for (var d = 0; d < m; d++) {
          var v = daily[d][field];
          if ((dir === 'buy' && v > 0) || (dir === 'sell' && v < 0)) sameDirDays++;
        }
        var consistencyOk = sameDirDays >= 3;

        var shift = !!dir && magnitudeOk && consistencyOk;

        var avgChangePct = 0;
        for (var c = 0; c < m; c++) avgChangePct += daily[c].change_pct;
        avgChangePct = m ? avgChangePct / m : 0;
        var priceConfirmed = dir === 'buy' ? avgChangePct > 0 : dir === 'sell' ? avgChangePct < 0 : false;

        return {
          trend_shift: shift,
          price_confirmed: priceConfirmed,
          note: shift
            ? ('최근 5일 ' + (v5 > 0 ? '플러스' : '마이너스') + ' vs 이전 15일 ' + (prior15 > 0 ? '플러스' : '마이너스')
              + ' 전환' + (priceConfirmed ? ' · 주가 동반' : ' · 주가 미동반'))
            : ''
        };
      }

      var name = '(mock)';
      var map = window.KRX_MAP || {};
      for (var nm in map) { if (map[nm] === code) { name = nm + ' (mock)'; break; } }

      console.log('[mock] fetchFlow', code);
      return Promise.resolve({
        code: code,
        name: name,
        as_of: daily[0].date,
        daily: daily,
        rolling: rolling,
        amount_estimate: {
          today_krw: asum('foreign_net', 1), '5d_krw': asum('foreign_net', 5),
          '10d_krw': asum('foreign_net', 10), '20d_krw': asum('foreign_net', 20),
          inst_today_krw: asum('inst_net', 1), inst_5d_krw: asum('inst_net', 5),
          inst_10d_krw: asum('inst_net', 10), inst_20d_krw: asum('inst_net', 20)
        },
        streak: { foreign: streakOf('foreign_net'), inst: streakOf('inst_net') },
        signal: { foreign: signalOf('foreign_net', 'foreign'), inst: signalOf('inst_net', 'inst') }
      });
    };
  }
</script>

</body>
</html>
