<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>home-dashboard 로컬 테스트</title>
<link rel="stylesheet" href="../css/home-dashboard.css" />
<link rel="stylesheet" href="../css/market-temp.css" />
<link rel="stylesheet" href="../css/marketcap-bubble.css" />
<style>
  body { font-family: 'Nanum Myeongjo', Georgia, serif; margin: 0; background: #fff; }
  html.dark body { background: #1a1a1a; }
  .page-head { max-width: 1600px; margin: 0 auto; padding: 20px 16px 0; }
  .tools { margin-bottom: 12px; display: flex; gap: 8px; flex-wrap: wrap; }
  .hint { font-size: 13px; color: #888; margin: 0 0 16px; }
</style>
</head>
<body>

<div class="page-head">
  <h1>home-dashboard 로컬 테스트</h1>
  <div class="tools">
    <button onclick="document.documentElement.classList.toggle('dark')">다크모드 토글</button>
  </div>
  <p class="hint">
    기본은 mock 데이터로 렌더링 검증(차트/게이지/트리맵/랭킹뉴스/AI박스 전부).
    실제 GAS+VM 호출로 테스트하려면 <code>?real=1</code>을 붙이세요(?action=indexChart는 GAS 수동 재배포 후에만 동작).
    이 페이지는 /test/ 경로라 home-dashboard.js의 홈페이지 전용 가드(location.pathname==='/')를
    피하려고 history.replaceState로 경로를 임시로 '/'처럼 보이게 만든다(실제 이동 아님, 새로고침 시 재적용됨).
  </p>
</div>

<div id="home-dashboard"></div>

<script src="../data/sectors-v3.js"></script>
<script src="../data/krx_map.js"></script>
<script src="../js/sector-dashboard-v4.js"></script>
<script src="../data/marketcap-codes.js"></script>
<script src="../js/marketcap-bubble.js"></script>
<script src="../js/market-temp.js"></script>
<script src="../js/lwc-common.js"></script>
<script>
  // home-dashboard.js는 홈페이지(경로 '/')에서만 렌더링하도록 가드가 있음 - 로컬 테스트 페이지는
  // /test/home-dashboard.html이라 실제 이동 없이 pathname만 '/'로 바꿔서 가드를 통과시킨다.
  try { history.replaceState(null, '', '/'); } catch (e) { /* 무시 */ }

  var REAL = location.search.indexOf('real=1') !== -1;

  // ---- market-temp / marketcap-bubble mock (기존 test/market-temp.html·test/marketcap-bubble.html과 동일 패턴) ----
  if (!REAL) {
    MarketTemp.fetchMarketTemp = function () {
      console.log('[mock] MarketTemp.fetchMarketTemp');
      return Promise.resolve({
        score: 82, maxScore: 110, temp: 29.8,
        grade: { emoji: '🟠', label: '탐욕', tone: 'greed' },
        components: {
          vix: { score: 14, value: 16.4 },
          flow: { score: 15, foreign: { score100: 78, ratio: 0.4, v5: 12345 }, inst: { score100: 60, ratio: 0.2, v5: 4321 } },
          tradingValue: { score: 10, relative: 1.1 },
          avgChange: { score: 12, avgChangeRate: 1.4 },
          riseRatio: { score: 8, ratio: 0.62, up: 150, down: 90, total: 240 },
          sectorStrength: { score: 8, sectorCount: 10, strongCount: 13 },
          week52: { score: 7, newHigh: 15, newLow: 3, scanned: 238 },
          exchange: { score: 4, changeRate: -0.3 },
          usFutures: { score: 4, changePct: 0.4, timeWeight: 1.0 }
        },
        history: { dayChange: 1.2, yesterday: 28.6, weekAvg: 27.9, weekDays: 7, monthAvg: 26.1, monthDays: 30 },
        updatedAt: '2026-07-16 15:30:00'
      });
    };

    var byCode = {};
    Object.keys(window.SECTOR_MAP || {}).forEach(function (sector) {
      window.SECTOR_MAP[sector].forEach(function (it) {
        if (!byCode[it.code]) byCode[it.code] = { name: it.name, market: it.market };
      });
    });
    MarketcapBubble.fetchBubbleData = function () {
      console.log('[mock] MarketcapBubble.fetchBubbleData');
      var data = { KOSPI: [], KOSDAQ: [], ETF: [], INVERSE: [], LEV: [] };
      var i = 0;
      Object.keys(byCode).forEach(function (code) {
        var u = byCode[code];
        var baseCap = (u.market === 'KOSPI' ? 20e12 : 2e12) * Math.pow(0.93, i % 40);
        i++;
        data[u.market === 'KOSPI' ? 'KOSPI' : 'KOSDAQ'].push({ code: code, name: u.name, cap: baseCap, changeRate: (Math.random() - 0.45) * 8 });
      });
      return Promise.resolve({ updatedAt: new Date().toISOString().slice(0, 19).replace('T', ' '), data: data });
    };
  }

  // ---- home-dashboard mock 차트/랭킹뉴스/AI 요약 ----
  function mockDaily(days, basePrice) {
    var rows = [];
    var price = basePrice;
    var d = new Date();
    d.setDate(d.getDate() - days);
    while (rows.length < days) {
      d.setDate(d.getDate() + 1);
      if (d.getDay() === 0 || d.getDay() === 6) continue; // 주말 제외(영업일만)
      var open = price;
      var close = open * (1 + (Math.random() - 0.48) * 0.02);
      var high = Math.max(open, close) * (1 + Math.random() * 0.006);
      var low = Math.min(open, close) * (1 - Math.random() * 0.006);
      var yyyy = d.getFullYear();
      var mm = String(d.getMonth() + 1).padStart(2, '0');
      var dd = String(d.getDate()).padStart(2, '0');
      rows.push({ date: '' + yyyy + mm + dd, open: open, high: high, low: low, close: close });
      price = close;
    }
    return rows;
  }

  function mockMovingAverage(rows, period) {
    var ma = new Array(rows.length).fill(null);
    var sum = 0;
    for (var i = 0; i < rows.length; i++) {
      sum += rows[i].close;
      if (i >= period) sum -= rows[i - period].close;
      if (i >= period - 1) ma[i] = sum / period;
    }
    return ma;
  }

  function mockChartResponse(basePrice) {
    var daily = mockDaily(500, basePrice);
    var closes = daily.map(function (d) { return d.close; });
    var lastClose = closes[closes.length - 1];
    return {
      daily: daily,
      ma: {
        ma5: mockMovingAverage(daily, 5),
        ma20: mockMovingAverage(daily, 20),
        ma60: mockMovingAverage(daily, 60),
        ma224: mockMovingAverage(daily, 224)
      },
      levels: {
        support: [lastClose * 0.95, lastClose * 0.9],
        resistance: [lastClose * 1.05, lastClose * 1.1]
      }
    };
  }

  var MOCK_RANK_NEWS = {
    items: Array.from({ length: 10 }, function (_, i) {
      return {
        title: '[mock] 오늘의 증시 헤드라인 ' + (i + 1) + ' - 코스피/코스닥 주요 이슈',
        link: 'https://example.com/news/' + (i + 1),
        pubDate: new Date(Date.now() - i * 20 * 60 * 1000).toISOString()
      };
    })
  };

</script>
<script src="../js/home-dashboard.js"></script>
<script>
  // module의 자체 DOMContentLoaded 리스너가 이 override 적용 이후에 실행되므로(같은 문서
  // 파싱 흐름 안이라 이 인라인 스크립트가 먼저 평가됨) 여기서 따로 init()을 호출하지 않아도
  // 첫 렌더는 mock으로 자동 진행된다 - test/market-temp.html과 동일 패턴.
  if (!REAL) {
    HomeDashboard.fetchJson = function (url) {
      console.log('[mock] HomeDashboard.fetchJson', url);
      if (url.indexOf('action=indexChart') > -1) {
        var symbol = /symbol=([A-Z]+)/.exec(url);
        var base = symbol && symbol[1] === 'KOSDAQ' ? 850 : 2900;
        return Promise.resolve(mockChartResponse(base));
      }
      if (url.indexOf('action=flowChart') > -1) {
        return Promise.resolve(mockChartResponse(70000));
      }
      if (url.indexOf('marketAnalysis=1') > -1) {
        return Promise.resolve({ analysis: '[mock] 오늘 코스피는 외국인 순매수 전환과 반도체 업종 강세에 힘입어 상승 마감했습니다.' });
      }
      if (url.indexOf('rankNews=1') > -1) {
        return Promise.resolve(MOCK_RANK_NEWS);
      }
      return Promise.reject(new Error('mock: unknown url ' + url));
    };
  }
</script>

</body>
</html>
