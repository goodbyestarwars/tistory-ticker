<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>market-temp 로컬 테스트</title>
<link rel="stylesheet" href="../css/market-temp.css" />
<style>
  body { font-family: 'Nanum Myeongjo', Georgia, serif; margin: 0; background: #fff; }
  html.dark body { background: #1a1a1a; }
  .page-body { max-width: 480px; margin: 40px auto; padding: 0 16px; }
  .tools { margin-bottom: 16px; display: flex; gap: 8px; flex-wrap: wrap; }
</style>
</head>
<body>

<div class="page-body">
  <h1>market-temp 로컬 테스트</h1>
  <div class="tools">
    <button onclick="document.documentElement.classList.toggle('dark')">다크모드 토글</button>
    <button onclick="setMock(95)">과열(95점=38.0℃)</button>
    <button onclick="setMock(75)">낙관(75점=30.0℃)</button>
    <button onclick="setMock(55)">중립(55점=22.0℃)</button>
    <button onclick="setMock(30)">공포(30점=12.0℃)</button>
    <button onclick="setMock(10)">극도의공포(10점=4.0℃)</button>
  </div>
  <p style="font-size:13px;color:#888">
    기본은 mock 스코어로 렌더링 검증. 실제 GAS 호출로 테스트하려면 <code>?real=1</code>을 붙이세요(GAS 재배포 후).
  </p>
  <div id="market-temp"></div>
</div>

<script src="../js/market-temp.js"></script>
<script>
  var currentScore = 95;

  function mockResponse(score) {
    // 7개 지표 배분은 대략적인 예시일 뿐, 합이 score가 되도록만 맞춤
    var vix = Math.round(Math.min(20, score * 0.20));
    var foreignFlow = Math.round(Math.min(15, score * 0.15));
    var instFlow = Math.round(Math.min(10, score * 0.10));
    var rise = Math.round(Math.min(20, score * 0.20));
    var vol = Math.round(Math.min(15, score * 0.15));
    var exchange = Math.round(Math.min(10, score * 0.10));
    var futures = Math.max(0, score - vix - foreignFlow - instFlow - rise - vol - exchange);

    var temp = Math.round(score * 0.4 * 10) / 10;
    var grade = temp < 10 ? { emoji: '🧊', label: '극도의 공포', tone: 'extreme-fear' }
      : temp < 20 ? { emoji: '🔵', label: '공포', tone: 'fear' }
      : temp < 28 ? { emoji: '🟡', label: '중립', tone: 'neutral' }
      : temp < 35 ? { emoji: '🟠', label: '낙관', tone: 'greed' }
      : { emoji: '🔥', label: '과열', tone: 'extreme-greed' };

    return {
      score: score,
      temp: temp,
      grade: grade,
      components: {
        vix: { score: vix, value: 16.4 },
        foreignFlow: { score: foreignFlow, ratio: 0.4 },
        instFlow: { score: instFlow, ratio: 0.3 },
        riseRatio: { score: rise, ratio: 0.62, up: 148, down: 90, total: 238 },
        tradingValue: { score: vol, relative: 1.12 },
        exchange: { score: exchange, changeRate: -0.2 },
        usFutures: { score: futures, changePct: 0.5 }
      },
      updatedAt: '2026-07-13 18:00:00'
    };
  }

  if (location.search.indexOf('real=1') === -1) {
    // module의 자체 DOMContentLoaded 리스너가 이 override 적용 이후에 실행되므로
    // 여기서 따로 init()을 호출하지 않아도 첫 렌더는 mock으로 자동 진행된다.
    MarketTemp.fetchMarketTemp = function () {
      console.log('[mock] fetchMarketTemp', currentScore);
      return Promise.resolve(mockResponse(currentScore));
    };
  }

  function setMock(score) {
    currentScore = score;
    if (location.search.indexOf('real=1') === -1) MarketTemp.init();
  }
</script>

</body>
</html>
