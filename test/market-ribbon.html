<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<title>market-ribbon 로컬 테스트</title>
<link rel="stylesheet" href="../css/market-ribbon.css" />
<style>
  body { font-family: 'Nanum Myeongjo', Georgia, serif; margin: 0; }
  .page-body { max-width: 720px; margin: 70px auto 40px; padding: 0 16px; }
  .tools { margin-bottom: 16px; display: flex; gap: 8px; flex-wrap: wrap; }
</style>
</head>
<body>

<div id="market-ribbon" class="market-ribbon"></div>

<div class="page-body">
  <h1>market-ribbon(사용자 선택형) 로컬 테스트</h1>
  <div class="tools">
    <button onclick="localStorage.removeItem('qi_selected_v1'); location.reload();">선택 초기화</button>
    <button onclick="fillSample()">샘플 4종 선택(코스피/코스닥/원달러/BTC)</button>
    <button onclick="fillAll()">10종 전체 선택</button>
  </div>
  <p style="font-size:13px;color:#888">
    기본은 mock 데이터로 렌더링만 검증. GAS(?market=1)는 어디서든 CORS가 열려있어 실제 호출도 되지만,
    VM(/futures)은 CORS가 ghlee.tistory.com만 허용해서 로컬 http.server에서는 막힐 수 있습니다
    (해외선물 6종은 라이브 페이지에서 최종 확인 필요). 실제 GAS 호출로 테스트하려면 <code>?real=1</code>.<br />
    우측 상단 "+ 지수 추가"를 눌러 체크박스로 항목을 골라보세요(즉시 localStorage에 저장됨).
  </p>
</div>

<script>
  window.__MOCK_MARKET__ = {
    kospi: { price: 2823.4, change: 12.5, changeRate: 0.44 },
    kosdaq: { price: 812.1, change: -3.2, changeRate: -0.39 },
    usdkrw: { price: 1372.5, change: -8.5, changeRate: -0.62 },
    btc: { price: 143250000, change: 1200000, changeRate: 0.85 }
  };
  window.__MOCK_FUTURES__ = [
    { symbol: 'KOSPI200_NIGHT', price: 412.5, change: 1.2, change_rate: 0.29 },
    { symbol: 'NASDAQ100', price: 29740, change: -85.5, change_rate: -0.29 },
    { symbol: 'SP500', price: 7575.2, change: 12.1, change_rate: 0.16 },
    { symbol: 'SOX', price: 12680.4, change: 55.2, change_rate: 0.44 },
    { symbol: 'WTI', price: 79.02, change: -0.42, change_rate: -0.53 },
    { symbol: 'VIX', price: 16.7, change: 0.35, change_rate: 2.14 }
  ];
</script>
<script src="../js/market-ribbon.js"></script>
<script>
  if (location.search.indexOf('real=1') === -1) {
    MarketRibbon.fetchMarket = function () {
      console.log('[mock] fetchMarket called');
      return Promise.resolve(window.__MOCK_MARKET__);
    };
    MarketRibbon.fetchFutures = function () {
      console.log('[mock] fetchFutures called');
      return Promise.resolve(window.__MOCK_FUTURES__);
    };
    if (!localStorage.getItem('qi_selected_v1')) {
      localStorage.setItem('qi_selected_v1', JSON.stringify(['kospi', 'kosdaq', 'usdkrw', 'btc']));
    }
    MarketRibbon.init();
  }

  function fillSample() {
    localStorage.setItem('qi_selected_v1', JSON.stringify(['kospi', 'kosdaq', 'usdkrw', 'btc']));
    location.reload();
  }
  function fillAll() {
    localStorage.setItem('qi_selected_v1', JSON.stringify(['kospi', 'kosdaq', 'usdkrw', 'btc', 'kospi_night', 'nasdaq', 'sp500', 'sox', 'wti', 'vix']));
    location.reload();
  }
</script>

</body>
</html>
